# S3 endpoint base URL (AWS S3 or S3-compatible)
endpoint: https://s3.example.com

# Region used by SDK signing/routing
region: us-east-1

# Target bucket for benchmark objects
bucket: perf-test-bucket

# Object key prefix for this test run (helps isolate/clean up)
prefix: s3bench

auth:
  # Environment variable names that contain credentials
  access_key_env: S3_ACCESS_KEY_ID
  secret_key_env: S3_SECRET_ACCESS_KEY
  session_token_env: S3_SESSION_TOKEN # optional (STS/temp creds)

execution:
  # Warmup phase duration (excluded from final metrics)
  warmup: 10s

  # Measured phase duration (used for reported metrics)
  duration: 30s

  # Number of concurrent workers generating load
  workers: 16

  # Timeout per request (PUT/GET/DELETE)
  per_request_timeout: 10s

dataset:
  # Object sizes to include in workload (supports B, KiB, MiB, GiB)
  object_sizes:
    - 64KiB
    - 1MiB
    - 16MiB

  # Number of objects created before measured run starts (helps GET/DELETE)
  prefill_objects: 200

  # deterministic => predictable incremental keys, random => random suffixes
  key_mode: deterministic

workload:
  # Mode: put | get | delete | mixed
  mode: mixed

  # Used when mode=mixed. Must sum to 100.
  mix:
    put: 50
    get: 40
    delete: 10

thresholds:
  # Fail if operation p95 exceeds this value (ms)
  p95_ms_max: 500

  # Fail if operation error rate exceeds this percentage
  error_rate_max_pct: 2.0

  # Fail if operation throughput drops below this MB/s
  min_throughput_mbps: 1
