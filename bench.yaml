endpoint: https://s3.example.com
region: us-east-1
bucket: perf-test-bucket
prefix: s3bench

auth:
  access_key_env: S3_ACCESS_KEY_ID
  secret_key_env: S3_SECRET_ACCESS_KEY
  session_token_env: S3_SESSION_TOKEN

execution:
  warmup: 10s
  duration: 30s
  workers: 16
  per_request_timeout: 10s

workload:
  mode: mixed
  mix:
    put: 50
    get: 40
    delete: 10
